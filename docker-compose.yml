services:
  frontend-build:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./docker/frontend/build.sh:/scripts/build.sh:ro
    command: ["/bin/sh", "/scripts/build.sh"]
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/var/www/frontend:ro
      - ./backend/storage/app/public:/var/www/storage-public:ro
    depends_on:
      php:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    networks:
      - app

  php:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\", 9000) ? 0 : 1);'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 900s
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  frontend_node_modules:
