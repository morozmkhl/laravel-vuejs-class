server {
    listen 80;
    server_name localhost;
    charset utf-8;
    client_max_body_size 12m;

    location /storage/ {
        alias /var/www/storage-public/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /api {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Хеши в именах файлов — можно кэшировать навсегда. Пропавший файл = 404, не подмена index.html (SPA).
    location /assets/ {
        root /var/www/frontend;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # index.html и SPA-fallback: не кэшировать, иначе после vite build старый HTML ссылается на удалённый /assets/index-*.js → белый экран.
    location / {
        root /var/www/frontend;
        index index.html;
        autoindex off;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
    }
}
